version: '3.8'

services:
  thewall:
    build: .
    image: thewall:latest
    container_name: thewall
    ports:
      - "3000:3000"
    environment:
      # Provider: 'unsplash', 'pexels', or 'local'
      THEWALL_PROVIDER: unsplash

      # Provider API key — Unsplash access key or Pexels API key, matching THEWALL_PROVIDER
      # Unsplash: https://unsplash.com/developers
      # Pexels:   https://www.pexels.com/api/
      THEWALL_PROVIDER_KEY: your_provider_key_here

      # Local provider configuration
      # THEWALL_LOCAL_FOLDER: /app/samples
      
      # Common settings
      THEWALL_IMAGE_INTERVAL: 30
      THEWALL_IMAGE_QUERY: nature
      PORT: 3000
